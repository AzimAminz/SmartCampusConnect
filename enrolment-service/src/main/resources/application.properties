# =========================================================================
# Enrolment Microservice — application.properties
# Port: 8081
# Database: db_enrolment
# =========================================================================

spring.application.name=enrolment-service
server.port=8081

# --- Database (db_enrolment) ---
spring.datasource.url=jdbc:mysql://db-enrolment:3306/db_enrolment?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Inter-service URLs ---
student.service.url=${STUDENT_SERVICE_URL:http://backend:8080}
notify.service.url=${NOTIFY_SERVICE_URL:http://notification-service:8083}
