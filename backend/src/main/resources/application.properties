spring.application.name=student-service

# =========================================================================
# DATABASE CONNECTION — db_student
# =========================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://db-student:3306/db_student?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================================
# JPA / HIBERNATE
# =========================================================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================================================================
# INTER-SERVICE URLs (used by DashboardController + ReportingController)
# =========================================================================
enrolment.service.url=${ENROLMENT_SERVICE_URL:http://enrolment-service:8081}
booking.service.url=${BOOKING_SERVICE_URL:http://booking-service:8082}
notify.service.url=${NOTIFY_SERVICE_URL:http://notification-service:8083}
