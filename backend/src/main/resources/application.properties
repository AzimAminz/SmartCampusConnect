spring.application.name=backend

# =========================================================================
# 🗄️ DATABASE CONNECTION SETTINGS (Supports Docker and Local Environment)
# =========================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smartcampus?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================================
# ☕ JPA / HIBERNATE SETTINGS
# =========================================================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================================================================
# 🔌 SOAP & TCP NOTIFICATION SERVER PORTS
# =========================================================================
soap.server.port=${SOAP_SERVER_PORT:8085}
notify.server.port=${NOTIFY_SERVER_PORT:9090}
notify.server.host=${NOTIFY_SERVER_HOST:localhost}
