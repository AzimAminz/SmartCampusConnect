services:
  # =========================================================================
  # 1. Databases (Database-per-Service Pattern)
  # =========================================================================
  db-student:
    image: mysql:8.0
    container_name: smartcampus-db-student
    restart: always
    ports:
      - "${FORWARD_DB_STUDENT_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: db_student
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - db_student_data:/var/lib/mysql
    networks:
      - smartcampus-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-enrolment:
    image: mysql:8.0
    container_name: smartcampus-db-enrolment
    restart: always
    ports:
      - "${FORWARD_DB_ENROLMENT_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: db_enrolment
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - db_enrolment_data:/var/lib/mysql
    networks:
      - smartcampus-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-booking:
    image: mysql:8.0
    container_name: smartcampus-db-booking
    restart: always
    ports:
      - "${FORWARD_DB_BOOKING_PORT:-3308}:3306"
    environment:
      MYSQL_DATABASE: db_booking
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - db_booking_data:/var/lib/mysql
    networks:
      - smartcampus-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-notification:
    image: mysql:8.0
    container_name: smartcampus-db-notification
    restart: always
    ports:
      - "${FORWARD_DB_NOTIFICATION_PORT:-3309}:3306"
    environment:
      MYSQL_DATABASE: db_notification
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - db_notification_data:/var/lib/mysql
    networks:
      - smartcampus-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========================================================================
  # 2. Microservices
  # =========================================================================
  student-service:
    image: maven:3.8.5-openjdk-17
    container_name: student-service
    restart: always
    ports:
      - "${FORWARD_STUDENT_PORT:-8080}:8080"
    working_dir: /app
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    command: ./mvnw spring-boot:run
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db-student:3306/db_student?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false"
      SPRING_DATASOURCE_USERNAME: "${DB_USERNAME:-root}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD:-}"
      ENROLMENT_SERVICE_URL: "http://enrolment-service:8081"
      BOOKING_SERVICE_URL: "http://booking-service:8082"
      NOTIFY_SERVICE_URL: "http://notification-service:8083"
    depends_on:
      db-student:
        condition: service_healthy
    networks:
      - smartcampus-network

  enrolment-service:
    image: maven:3.8.5-openjdk-17
    container_name: enrolment-service
    restart: always
    ports:
      - "${FORWARD_ENROLMENT_PORT:-8081}:8081"
    working_dir: /app
    volumes:
      - ./enrolment-service:/app
      - maven_cache:/root/.m2
    command: ./mvnw spring-boot:run
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db-enrolment:3306/db_enrolment?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false"
      SPRING_DATASOURCE_USERNAME: "${DB_USERNAME:-root}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD:-}"
      STUDENT_SERVICE_URL: "http://student-service:8080"
      NOTIFY_SERVICE_URL: "http://notification-service:8083"
    depends_on:
      db-enrolment:
        condition: service_healthy
    networks:
      - smartcampus-network

  booking-service:
    image: maven:3.8.5-openjdk-17
    container_name: booking-service
    restart: always
    ports:
      - "${FORWARD_BOOKING_PORT:-8082}:8082"
      - "${FORWARD_SOAP_PORT:-8085}:8085"
    working_dir: /app
    volumes:
      - ./booking-service:/app
      - maven_cache:/root/.m2
    command: ./mvnw spring-boot:run
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db-booking:3306/db_booking?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false"
      SPRING_DATASOURCE_USERNAME: "${DB_USERNAME:-root}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD:-}"
      SOAP_SERVER_PORT: "${FORWARD_SOAP_PORT:-8085}"
      NOTIFY_SERVICE_URL: "http://notification-service:8083"
    depends_on:
      db-booking:
        condition: service_healthy
    networks:
      - smartcampus-network

  notification-service:
    image: maven:3.8.5-openjdk-17
    container_name: notification-service
    restart: always
    ports:
      - "${FORWARD_NOTIFICATION_PORT:-8083}:8083"
      - "${FORWARD_NOTIFY_PORT:-9090}:9090"
    working_dir: /app
    volumes:
      - ./notification-service:/app
      - maven_cache:/root/.m2
    command: ./mvnw spring-boot:run
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db-notification:3306/db_notification?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false"
      SPRING_DATASOURCE_USERNAME: "${DB_USERNAME:-root}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD:-}"
      NOTIFY_SERVER_PORT: "${FORWARD_NOTIFY_PORT:-9090}"
    depends_on:
      db-notification:
        condition: service_healthy
    networks:
      - smartcampus-network

  # =========================================================================
  # 3. Web Frontend
  # =========================================================================
  web-frontend:
    image: nginx:alpine
    container_name: smartcampus-web
    restart: always
    ports:
      - "${FORWARD_WEB_PORT:-3000}:80"
    volumes:
      - ./web:/usr/share/nginx/html
    depends_on:
      - student-service
    networks:
      - smartcampus-network

networks:
  smartcampus-network:
    driver: bridge

volumes:
  db_student_data:
    driver: local
  db_enrolment_data:
    driver: local
  db_booking_data:
    driver: local
  db_notification_data:
    driver: local
  maven_cache:
    driver: local
