# =========================================================================
# Notification Microservice — application.properties
# Port: 8083 (REST) | 9090 (TCP Socket)
# Database: db_notification
# =========================================================================

spring.application.name=notification-service
server.port=8083

# --- Database (db_notification) ---
spring.datasource.url=jdbc:mysql://db-notification:3306/db_notification?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- TCP Notification Server Port ---
notify.server.port=${NOTIFY_SERVER_PORT:9090}
