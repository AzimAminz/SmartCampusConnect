# =========================================================================
# Booking Microservice — application.properties
# Port: 8082 (REST) | 8085 (SOAP)
# Database: db_booking
# =========================================================================

spring.application.name=booking-service
server.port=8082

# --- Database (db_booking) ---
spring.datasource.url=jdbc:mysql://db-booking:3306/db_booking?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- SOAP server port ---
soap.server.port=${SOAP_SERVER_PORT:8085}

# --- Inter-service URLs ---
notify.service.url=${NOTIFY_SERVICE_URL:http://notification-service:8083}
